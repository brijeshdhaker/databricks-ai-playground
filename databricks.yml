# This is a Declarative Automation Bundle definition for databricks-ai-playground.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bundle_databricks_apps
  uuid: 60f10c32-9334-4f7f-9b11-d829da36a95f

include:
  - databricks-dqx-app/resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.    
variables:
  catalog:
    description: The catalog to use
    default: "data_quality"
  schema:
    description: The schema to use
    default: "default"
  lakebase_project_id:
    description: "Lakebase Project ID"
    default: "mcp-ai-playground"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # ${workspace.current_user.short_name}  
    mode: development
    default: true
    variables:
      catalog: data_quality
      schema: default
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com
      #root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      root_path: /Workspace/Applications
      
  ## Optionally, there could be 'staging' or 'prod' targets here.
  prod:
    variables:
      catalog: data_quality
      schema: default  
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com
      #root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      root_path: /Workspace/Applications
    permissions:
      - user_name: brijeshdhaker@gmail.com
        level: CAN_MANAGE

resources:
  #
  postgres_projects:
    builder_db:
      project_id: ${var.lakebase_project_id}
      display_name: "mcp-ai-playground"
      pg_version: 17
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 2
        suspend_timeout_duration: "300s"
  #
  apps:
    databricks_dqx_app:
      name: databricks_dqx_app
      source_code_path: ./databricks-dqx-app
      resources:
        - name: 'a_number'
          uc_securable:
            securable_full_name: 'workspace.default.a_number'
            securable_type: 'FUNCTION'
            permission: 'EXECUTE'
        - name: 'Bakehouse Sales Starter Space'
          genie_space:
            name: 'genie_space'
            space_id: '01f09dad81ae105b9cd77cec8660f37c'
            permission: 'CAN_RUN'
    #
    mcp_ai_playground:
      name: mcp_ai_playground
      source_code_path: ./databricks-builder-app
      resources:
        - name: 'Bakehouse Sales Starter Space'
          genie_space:
            name: 'genie_space'
            space_id: '01f09dad81ae105b9cd77cec8660f37c'
            permission: 'CAN_RUN'
  

