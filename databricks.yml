# This is a Declarative Automation Bundle definition for databricks-ai-playground.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: databricks-ai-playground

variables:
  lakebase_project_id:
    description: "Lakebase project ID"
    default: "mcp-ai-playground"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  prod:
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com

resources:
  postgres_projects:
    builder_db:
      project_id: ${var.lakebase_project_id}
      display_name: "mcp-ai-playground"
      pg_version: 17
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 2
        suspend_timeout_duration: "300s"

  

