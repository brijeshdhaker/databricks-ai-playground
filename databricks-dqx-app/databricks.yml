# This is a Declarative Automation Bundle definition for databricks-ai-playground.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_dqx_app
  uuid: 60f10c32-9334-4f7f-9b11-d829da36a95f

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.    
variables:
  catalog:
    description: The catalog to use
    default: "data_quality"
  schema:
    description: The schema to use
    default: "default"
  lakebase_project_id:
    description: "Lakebase Project ID"
    default: "databricks-ai-playground"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # ${workspace.current_user.short_name}  
    mode: development
    default: true
    variables:
      catalog: data_quality
      schema: default
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/apps/databricks-dqx-app
      
  ## Optionally, there could be 'staging' or 'prod' targets here.
  prod:
    variables:
      catalog: data_quality
      schema: default  
    workspace:
      host: https://dbc-ad78fc43-bcc0.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/apps/databricks-dqx-app
    permissions:
      - user_name: brijeshdhaker@gmail.com
        level: CAN_MANAGE


