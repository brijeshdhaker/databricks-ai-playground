# A sample job for job_dqx_qc_pipeline.
resources:
  jobs:
    job_pipeline_dqx_qc:
      name: job_pipeline_dqx_qc

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      email_notifications:
        on_failure:
          - brijeshdhaker@gmail.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      
      tasks:
        - task_key: notebook_task
          #serverless: {}
          environment_key: default     # Link the task her        
          notebook_task:
            notebook_path: ../databricks_dqx_app/sample_notebook.ipynb
        - task_key: python_wheel_task
          depends_on:
            - task_key: notebook_task
          python_wheel_task:
            package_name: databricks_dqx_app.main
            entry_point: main
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: default
        - task_key: refresh_pipeline
          depends_on:
            - task_key: notebook_task
          pipeline_task:
            pipeline_id: ${resources.pipelines.etl_pipeline_dqx_qc.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # By default we just include the .whl file generated for the bd-databricks-module package.
              # See https://docs.databricks.com/dev-tools/bundles/library-dependencies.html
              # for more information on how to add other libraries.
              - ../dist/*.whl
              - databricks-labs-dqx==0.12.0
